<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Голосование за спикера</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@5/dist/fp.min.js"></script>
</head>
<body>
    <div class="voting-container">
        <!-- Decorative Background Elements -->
        <div class="bg-gradient-wave"></div>
        <div class="bg-abstract-lines"></div>

        <!-- Header -->
        <header class="voting-header">
            <div class="logo-wrapper">
                <svg class="logo-icon" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M20 3.33333L23.3333 6.66667V15L20 18.3333L16.6667 15V6.66667L20 3.33333Z" fill="url(#logo-gradient)"/>
                    <path d="M10 10L13.3333 13.3333V21.6667L10 25L6.66667 21.6667V13.3333L10 10Z" fill="url(#logo-gradient)"/>
                    <path d="M30 10L33.3333 13.3333V21.6667L30 25L26.6667 21.6667V13.3333L30 10Z" fill="url(#logo-gradient)"/>
                    <path d="M20 21.6667L23.3333 25V33.3333L20 36.6667L16.6667 33.3333V25L20 21.6667Z" fill="url(#logo-gradient)"/>
                    <defs>
                        <linearGradient id="logo-gradient" x1="6.66667" y1="3.33333" x2="33.3333" y2="36.6667" gradientUnits="userSpaceOnUse">
                            <stop stop-color="#FFD84D"/>
                            <stop offset="1" stop-color="#FF7A00"/>
                        </linearGradient>
                    </defs>
                </svg>
            </div>
            <div class="status-pill" id="session-status">
                Загрузка...
            </div>
        </header>

        <!-- Main Voting Card -->
        <main class="voting-card-main">
            <h1 class="voting-title">За кого вы голосуете?</h1>
            
            <!-- Loading State -->
            <div id="loading-spinner" class="loading-spinner">
                <div class="spinner"></div>
                <p class="loading-text">Загрузка данных...</p>
            </div>
            
            <!-- Voting Buttons (hidden until loaded) -->
            <div id="voting-buttons" class="speaker-buttons" style="display: none;">
                <button id="vote-a" class="speaker-card btn-a" onclick="vote('A')">
                    <div class="speaker-card-content">
                        <div class="speaker-badge-card badge-a-card">
                            <span class="badge-letter">A</span>
                        </div>
                        <span class="speaker-label" id="speaker-a-label">Спикер A</span>
                    </div>
                </button>
                
                <button id="vote-b" class="speaker-card btn-b" onclick="vote('B')">
                    <div class="speaker-card-content">
                        <div class="speaker-badge-card badge-b-card">
                            <span class="badge-letter">B</span>
                        </div>
                        <span class="speaker-label" id="speaker-b-label">Спикер B</span>
                    </div>
                </button>
            </div>
            
            <div id="vote-confirmation" class="confirmation-card" style="display: none;">
                <div class="check-circle">
                    <span class="check-icon">✓</span>
                </div>
                <p class="confirmation-text">Ваш голос принят!</p>
                <p class="confirmation-subtext">Вы можете изменить свой голос в любой момент</p>
            </div>
        </main>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let voterId = localStorage.getItem('debateVoterId');
        let isActive = false;
        let wasActive = false;
        let fingerprint = null;
        
        // Get current session data from localStorage
        let sessionData = JSON.parse(localStorage.getItem('debateSessionData') || 'null');
        let currentVote = null;
        let previousSessionId = null;
        let isFingerprintReady = false;
        
        // Restore vote only if we have session data
        if (sessionData && sessionData.sessionId) {
            previousSessionId = sessionData.sessionId;
            currentVote = sessionData.vote;
        }

        // Initialize voter ID - this is stable across reloads
        if (!voterId) {
            voterId = 'voter_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('debateVoterId', voterId);
        }

        // Initialize FingerprintJS
        async function initFingerprint() {
            try {
                const fp = await FingerprintJS.load();
                const result = await fp.get();
                fingerprint = result.visitorId;
                isFingerprintReady = true;
                console.log('Fingerprint initialized:', fingerprint);
            } catch (error) {
                console.error('FingerprintJS error:', error);
                isFingerprintReady = true;
            }
        }

        // Start fingerprint initialization
        initFingerprint();

        let isLoaded = false;
        
        // Check session status on load
        async function checkSession() {
            try {
                const response = await fetch('/api/results');
                const data = await response.json();
                
                // Handle session changes
                if (data.active && data.sessionId) {
                    // Check if this is a new session (different from stored one)
                    if (previousSessionId && data.sessionId !== previousSessionId) {
                        // New session detected - reset vote
                        currentVote = null;
                        sessionData = { sessionId: data.sessionId, vote: null };
                        localStorage.setItem('debateSessionData', JSON.stringify(sessionData));
                        hideConfirmation();
                    } else if (!previousSessionId) {
                        // First load of this session
                        sessionData = { sessionId: data.sessionId, vote: null };
                        localStorage.setItem('debateSessionData', JSON.stringify(sessionData));
                    }
                    previousSessionId = data.sessionId;
                } else if (!data.active) {
                    // Session is inactive - clear session data
                    previousSessionId = null;
                    sessionData = null;
                    localStorage.removeItem('debateSessionData');
                }
                
                wasActive = data.active;
                isActive = data.active;
                
                // Update speaker names and hide loader on first load
                if (data.speakerAName && !isLoaded) {
                    updateSpeakerNames(data.speakerAName, data.speakerBName);
                    hideLoader();
                    isLoaded = true;
                }
                
                updateUI();
            } catch (error) {
                console.error('Error checking session:', error);
                document.getElementById('session-status').textContent = 'Ошибка подключения';
                hideLoader();
                isLoaded = true;
            }
        }
        
        function hideLoader() {
            document.getElementById('loading-spinner').style.display = 'none';
            document.getElementById('voting-buttons').style.display = 'flex';
        }

        function hideConfirmation() {
            document.getElementById('vote-confirmation').style.display = 'none';
            document.getElementById('vote-a').classList.remove('selected');
            document.getElementById('vote-b').classList.remove('selected');
        }

        function updateSpeakerNames(speakerAName, speakerBName) {
            document.getElementById('speaker-a-label').textContent = speakerAName || 'Спикер A';
            document.getElementById('speaker-b-label').textContent = speakerBName || 'Спикер B';
        }

        function updateUI() {
            const statusEl = document.getElementById('session-status');
            const buttonsEl = document.getElementById('voting-buttons');
            
            if (!isActive) {
                statusEl.textContent = 'Голосование ещё не началось или завершено';
                statusEl.className = 'status-pill inactive';
                buttonsEl.style.pointerEvents = 'none';
                buttonsEl.style.opacity = '0.5';
            } else {
                statusEl.textContent = 'Голосование активно!';
                statusEl.className = 'status-pill active';
                buttonsEl.style.pointerEvents = 'auto';
                buttonsEl.style.opacity = '1';
                
                // Show current vote only if user has actually voted (A or B)
                if (currentVote === 'A' || currentVote === 'B') {
                    showConfirmation(currentVote);
                }
            }
        }

        async function vote(speaker) {
            if (!isActive) {
                alert('Голосование ещё не началось или завершено');
                return;
            }

            try {
                const requestBody = {
                    speaker: speaker,
                    voterId: voterId
                };

                // Add fingerprint if available
                if (fingerprint) {
                    requestBody.fingerprint = fingerprint;
                }

                const response = await fetch('/api/vote', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(requestBody)
                });

                const data = await response.json();
                
                if (data.success) {
                    currentVote = speaker;
                    // Save vote with session data
                    sessionData = { sessionId: previousSessionId, vote: speaker };
                    localStorage.setItem('debateSessionData', JSON.stringify(sessionData));
                    showConfirmation(speaker);
                } else if (response.status === 429) {
                    alert('Слишком много голосов. Подождите минуту.');
                } else {
                    alert(data.error || 'Ошибка голосования');
                }
            } catch (error) {
                console.error('Vote error:', error);
                alert('Ошибка подключения. Попробуйте ещё раз.');
            }
        }

        function showConfirmation(speaker) {
            const confirmationEl = document.getElementById('vote-confirmation');
            const buttonsEl = document.getElementById('voting-buttons');
            
            // Update button styles
            document.getElementById('vote-a').classList.remove('selected');
            document.getElementById('vote-b').classList.remove('selected');
            document.getElementById('vote-' + speaker.toLowerCase()).classList.add('selected');
            
            confirmationEl.style.display = 'flex';
            
            // Get current speaker name
            const speakerAName = document.getElementById('speaker-a-label').textContent;
            const speakerBName = document.getElementById('speaker-b-label').textContent;
            const speakerName = speaker === 'A' ? speakerAName : speakerBName;
            
            confirmationEl.querySelector('.confirmation-text').textContent = `Вы проголосовали за ${speakerName}`;
        }

        // Listen for real-time updates
        socket.on('voteUpdate', (data) => {
            console.log('Vote update received:', data);
        });

        // Initialize
        checkSession();
        
        // Poll for session status every 5 seconds
        setInterval(checkSession, 5000);
    </script>
</body>
</html>
