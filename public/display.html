<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дебаты</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="display-container">
        <!-- Decorative Background Elements -->
        <div class="bg-gradient-wave"></div>
        <div class="bg-abstract-lines"></div>

        <!-- Header -->
        <header class="display-header">
            <div class="logo-wrapper">
                <svg class="logo-icon" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M20 3.33333L23.3333 6.66667V15L20 18.3333L16.6667 15V6.66667L20 3.33333Z" fill="url(#logo-gradient)"/>
                    <path d="M10 10L13.3333 13.3333V21.6667L10 25L6.66667 21.6667V13.3333L10 10Z" fill="url(#logo-gradient)"/>
                    <path d="M30 10L33.3333 13.3333V21.6667L30 25L26.6667 21.6667V13.3333L30 10Z" fill="url(#logo-gradient)"/>
                    <path d="M20 21.6667L23.3333 25V33.3333L20 36.6667L16.6667 33.3333V25L20 21.6667Z" fill="url(#logo-gradient)"/>
                    <defs>
                        <linearGradient id="logo-gradient" x1="6.66667" y1="3.33333" x2="33.3333" y2="36.6667" gradientUnits="userSpaceOnUse">
                            <stop stop-color="#FFD84D"/>
                            <stop offset="1" stop-color="#FF7A00"/>
                        </linearGradient>
                    </defs>
                </svg>
            </div>
            <div class="status-pill" id="session-status">
                Дебаты идут. Голосование активно!
            </div>
        </header>

        <!-- Top Section: Topic + QR -->
        <div class="top-section">
            <div class="topic-card" id="debate-topic-display" style="display: none;">
                <span class="topic-label">ТЕМА ДЕБАТОВ</span>
                <h1 class="topic-title" id="debate-topic-text"></h1>
            </div>
            
            <div class="qr-card" id="qr-section" style="display: none;">
                <p class="qr-card-text">Сканируй QR-код и голосуй</p>
                <div class="qr-wrapper">
                    <img id="qr-code-display" src="" alt="QR Code" class="qr-image-display">
                </div>
            </div>
        </div>

        <!-- Main Voting Card -->
        <main class="voting-card">
            <div class="speaker-block speaker-a-block">
                <h2 class="speaker-name" id="speaker-a-name">Спикер A</h2>
                <div class="percentage percentage-a" id="percentage-a">50%</div>
                <div class="progress-bar progress-a">
                    <div class="progress-fill fill-a" id="progress-a" style="width: 50%"></div>
                </div>
                <div class="votes-info">
                    <svg class="user-icon" viewBox="0 0 20 20" fill="currentColor">
                        <path d="M10 10a4 4 0 100-8 4 4 0 000 8zM3 16a7 7 0 1114 0H3z"/>
                    </svg>
                    <span id="votes-a">0 голосов</span>
                </div>
            </div>

            <div class="vs-circle">
                <span class="vs-text">VS</span>
            </div>

            <div class="speaker-block speaker-b-block">
                <h2 class="speaker-name" id="speaker-b-name">Спикер B</h2>
                <div class="percentage percentage-b" id="percentage-b">50%</div>
                <div class="progress-bar progress-b">
                    <div class="progress-fill fill-b" id="progress-b" style="width: 50%"></div>
                </div>
                <div class="votes-info">
                    <svg class="user-icon" viewBox="0 0 20 20" fill="currentColor">
                        <path d="M10 10a4 4 0 100-8 4 4 0 000 8zM3 16a7 7 0 1114 0H3z"/>
                    </svg>
                    <span id="votes-b">0 голосов</span>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="display-footer">
            <div class="participants-pill">
                <span class="participants-label">Всего участников:</span>
                <span class="participants-count" id="total-votes">0</span>
            </div>
        </footer>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let currentResults = { A: 50, B: 50, totalVotes: 0 };
        let isActive = false;

        // Connect to socket
        socket.on('connect', () => {
            console.log('Connected to server');
        });

        // Listen for vote updates
        socket.on('voteUpdate', (data) => {
            updateDisplay(data);
        });

        // Fetch initial results
        async function fetchResults() {
            try {
                const response = await fetch('/api/results');
                const data = await response.json();
                isActive = data.active;
                updateDisplay(data.results);
                updateSessionStatus(isActive);
                if (data.topic) {
                    updateTopicDisplay(data.topic);
                }
                if (data.speakerAName || data.speakerBName) {
                    updateSpeakerNames(data.speakerAName, data.speakerBName);
                }
            } catch (error) {
                console.error('Error fetching results:', error);
            }
        }

        function updateTopicDisplay(topic) {
            const topicDisplay = document.getElementById('debate-topic-display');
            const topicText = document.getElementById('debate-topic-text');
            
            if (topic && topic !== 'Тема не указана') {
                topicText.textContent = topic;
                topicDisplay.style.display = 'block';
            } else {
                topicDisplay.style.display = 'none';
            }
        }

        function updateSpeakerNames(speakerAName, speakerBName) {
            document.getElementById('speaker-a-name').textContent = speakerAName || 'Спикер A';
            document.getElementById('speaker-b-name').textContent = speakerBName || 'Спикер B';
        }

        function updateDisplay(results) {
            currentResults = results;
            
            document.getElementById('percentage-a').textContent = results.A + '%';
            document.getElementById('percentage-b').textContent = results.B + '%';
            
            document.getElementById('progress-a').style.width = results.A + '%';
            document.getElementById('progress-b').style.width = results.B + '%';
            
            const votesA = Math.round((results.A / 100) * results.totalVotes);
            const votesB = Math.round((results.B / 100) * results.totalVotes);
            
            document.getElementById('votes-a').textContent = votesA + ' голос' + getVoteDeclension(votesA);
            document.getElementById('votes-b').textContent = votesB + ' голос' + getVoteDeclension(votesB);
            document.getElementById('total-votes').textContent = results.totalVotes;
        }

        function updateSessionStatus(active) {
            const statusEl = document.getElementById('session-status');
            if (active) {
                statusEl.textContent = 'Дебаты идут. Голосование активно!';
                statusEl.className = 'status-pill active';
            } else {
                statusEl.textContent = 'Дебаты не активны';
                statusEl.className = 'status-pill inactive';
            }
            isActive = active;
        }

        function getVoteDeclension(number) {
            const lastDigit = number % 10;
            const lastTwoDigits = number % 100;
            
            if (lastTwoDigits >= 11 && lastTwoDigits <= 19) {
                return 'ов';
            }
            if (lastDigit === 1) {
                return '';
            }
            if (lastDigit >= 2 && lastDigit <= 4) {
                return 'а';
            }
            return 'ов';
        }

        setInterval(() => {
            fetch('/api/results')
                .then(r => r.json())
                .then(data => {
                    if (data.active !== isActive) {
                        isActive = data.active;
                        updateSessionStatus(isActive);
                    }
                });
        }, 5000);

        fetchResults();

        async function generateQRCode() {
            try {
                const votingUrl = window.location.origin;
                const response = await fetch('/api/qr?url=' + encodeURIComponent(votingUrl));
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('qr-code-display').src = data.qrCode;
                    document.getElementById('qr-section').style.display = 'flex';
                }
            } catch (error) {
                console.error('Error generating QR:', error);
            }
        }

        function checkAndShowQR() {
            fetch('/api/results')
                .then(r => r.json())
                .then(data => {
                    const qrSection = document.getElementById('qr-section');
                    if (data.active && qrSection.style.display === 'none') {
                        generateQRCode();
                    } else if (!data.active && qrSection.style.display === 'flex') {
                        qrSection.style.display = 'none';
                    }
                })
                .catch(error => console.error('Error checking QR:', error));
        }

        checkAndShowQR();
        setInterval(checkAndShowQR, 5000);
    </script>
</body>
</html>
